<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>真正3D渐变立方体（蓝→红渐变）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 3D视窗容器 */
        .scene {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            /* 开启真实3D透视 */
            perspective: 1000px;
        }

        /* 立方体本体 */
        .cube {
            width: 220px;
            height: 220px;
            /* 关键：真正3D空间 */
            transform-style: preserve-3d;
            /* 自动旋转动画 */
            animation: rotate 8s linear infinite;
        }

        /* 立方体6个面公共样式 */
        .face {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.9;
        }

        /* 6个面 统一使用 蓝色 → 红色 渐变 */
        .front  { transform: rotateY(0deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }
        .back   { transform: rotateY(180deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }
        .left   { transform: rotateY(-90deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }
        .right  { transform: rotateY(90deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }
        .top    { transform: rotateX(90deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }
        .bottom { transform: rotateX(-90deg) translateZ(110px); background: linear-gradient(135deg, #007bff, #ff3333); }

        /* 3D旋转动画 */
        @keyframes rotate {
            0%   { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face right"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>
</body>
</html>
